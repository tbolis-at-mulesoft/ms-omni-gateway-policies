#
# Strict mode: rejectOnFailure=true, timestampToleranceSeconds=300
# See api-test-scenarios.yaml for additional test configurations on /log-only/ and /short-tolerance/.
---
apiVersion: gateway.mulesoft.com/v1alpha1
kind: ApiInstance
metadata:
  name: ingress-http
spec:
  address: http://0.0.0.0:8081/strict/
  services:
    upstream:
      address: http://backend
      routes:
        - config:
            destinationPath: /anything/echo/
  policies:
    - policyRef:
        name: slack-request-verification-flex-v1-1
        namespace: default
      config:
        signingSecret: "8f742231b10e8888abcd99yyyzzz85a5"
        rejectOnFailure: true
        timestampToleranceSeconds: 300
