---
apiVersion: gateway.mulesoft.com/v1alpha1
kind: ApiInstance
metadata:
  name: ingress-http
spec:
  address: http://0.0.0.0:8185
  services:
    upstream:
      address: "http://backend"
      routes:
        - config:
            destinationPath: /
  policies:
    - policyRef:
        name: a-two-a-pii-guard-flex-v1-0
        namespace: default
      config:
        # Predefined PII types to detect
        predefinedEntities:
          - type: Email
            actions:
              - Log
          - type: US SSN
            actions:
              - Log
              - Reject
        # Custom regex patterns to detect
        customEntities:
          - regex: "[A-Z]{6}\\d{2}[A-Z]\\d{2}[A-Z]\\d{3}[A-Z]"
            name: Italian Codice Fiscale
            actions:
              - Log
            reportPolicyViolationOnLog: false
          - regex: "[A-Z]{2}\\d{3}[A-Z]{2}"
            name: Italian Car Plate
            actions:
              - Reject
        # Error code to return on reject
        errorCodeOnReject: -32069
